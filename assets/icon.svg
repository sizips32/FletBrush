  <!-- Decorative strokes -->
  <path d="M 220 200 L 240 220 L 230 240 L 250 260" 
        stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <path d="M 280 180 L 300 200 L 290 220 L 310 240" 
