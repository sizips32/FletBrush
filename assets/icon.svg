<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brushGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007bff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0056b3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#brushGradient)"/>
  
  <!-- Brush handle -->
  <rect x="180" y="120" width="30" height="200" rx="15" fill="#8B4513" opacity="0.9"/>
  <rect x="182" y="122" width="26" height="196" rx="13" fill="#A0522D"/>
  
  <!-- Brush bristles -->
  <path d="M 195 320 Q 200 340 210 360 Q 220 380 235 400 Q 250 420 270 430 Q 290 440 310 435 Q 330 430 345 415 Q 360 400 365 380 Q 370 360 365 340 Q 360 320 350 305 Q 340 290 325 280 Q 310 270 295 275 Q 280 280 270 290 Q 260 300 255 310 Z" 
        fill="#FFFFFF" opacity="0.95"/>
  
